name: Build installers

# Builds the Mac .dmg and Windows installer automatically.
#
# How to use:
#  - Push a tag like v0.1.0  -> builds both AND publishes a Releases page with
#    the .dmg and .exe attached (this is what you send lab people to).
#  - Or click "Run workflow" on the Actions tab -> builds both and attaches them
#    to that run as downloadable artifacts (good for a quick test build).
#
# Code signing: the lab has no paid Apple/Windows developer account. The Windows .exe is
# unsigned. The macOS build IS signed with a self-signed certificate (see the signing step below)
# because macOS only REMEMBERS the camera/mic permission for an app with a stable code signature —
# an unsigned app re-prompts on every launch/join. It is still not notarized, so users do the
# one-time "Open Anyway". For a signature that stays stable across releases (so permissions survive
# app updates too), add repo secrets CSC_LINK (base64 of a .p12) + CSC_KEY_PASSWORD; without them
# a throwaway cert is generated per build. First-time-open steps are in docs/INSTALL_GUIDE.md.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            script: build:mac
          - os: windows-latest
            script: build:win
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # macOS only: make sure the build is code-signed, so macOS remembers the camera/mic grant.
      # If a stable cert is provided via secrets (CSC_LINK base64 .p12 + CSC_KEY_PASSWORD),
      # electron-builder uses it directly and this step just no-ops. Otherwise we generate a
      # throwaway self-signed cert, import it, TRUST it for code signing, and — critically — verify
      # the identity is actually discoverable so a signing regression fails the build LOUDLY
      # instead of silently shipping an unsigned app that re-prompts for the mic forever.
      - name: Set up macOS code signing
        if: matrix.os == 'macos-latest'
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
        run: |
          set -euo pipefail
          if [ -n "${CSC_LINK:-}" ]; then
            echo "CSC_LINK secret present — electron-builder will sign with the provided certificate."
            exit 0
          fi
          echo "No CSC_LINK secret; generating a throwaway self-signed code-signing certificate."
          KPWD="ci-$RANDOM$RANDOM"
          KEYCHAIN="$RUNNER_TEMP/synclink.keychain-db"
          cat > "$RUNNER_TEMP/cert.cnf" <<'EOF'
          [req]
          distinguished_name = dn
          x509_extensions = v3
          prompt = no
          [dn]
          CN = SyncLink Self-Signed
          [v3]
          basicConstraints = critical,CA:FALSE
          keyUsage = critical,digitalSignature
          extendedKeyUsage = critical,codeSigning
          EOF
          /usr/bin/openssl req -x509 -newkey rsa:2048 -sha256 -days 3650 -nodes \
            -keyout "$RUNNER_TEMP/key.pem" -out "$RUNNER_TEMP/cert.pem" \
            -config "$RUNNER_TEMP/cert.cnf"
          # -legacy: macOS's Security importer rejects OpenSSL 3's default PBES2/AES .p12 encryption.
          /usr/bin/openssl pkcs12 -export -legacy -out "$RUNNER_TEMP/cert.p12" \
            -inkey "$RUNNER_TEMP/key.pem" -in "$RUNNER_TEMP/cert.pem" -passout pass:"$KPWD"
          security create-keychain -p "$KPWD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KPWD" "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$KPWD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KPWD" "$KEYCHAIN"
          # Trust the self-signed leaf as a code-signing anchor in the System keychain. WITHOUT this,
          # `security find-identity -v -p codesigning` (how electron-builder discovers the identity)
          # filters out the untrusted cert, signing is skipped, and the app ships unsigned. Runners
          # have passwordless sudo.
          sudo security add-trusted-cert -d -r trustRoot -p codeSign \
            -k /Library/Keychains/System.keychain "$RUNNER_TEMP/cert.pem"
          # Put our keychain on the search list AND make it default so osx-sign looks there.
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed s/\"//g)
          security default-keychain -s "$KEYCHAIN"
          # Fail LOUDLY if no valid code-signing identity is visible (0 = would ship unsigned).
          if ! security find-identity -v -p codesigning "$KEYCHAIN" | grep -qE '[1-9][0-9]* valid identities found'; then
            echo "::error::No valid code-signing identity — the macOS build would ship UNSIGNED and re-prompt for camera/mic forever."
            security find-identity -v -p codesigning "$KEYCHAIN" || true
            exit 1
          fi
          security find-identity -v -p codesigning "$KEYCHAIN"
          echo "CSC_KEYCHAIN=$KEYCHAIN" >> "$GITHUB_ENV"

      - name: Build the installer
        run: npm run ${{ matrix.script }}
        env:
          # Provided-cert path (macOS only): electron-builder imports CSC_LINK/CSC_KEY_PASSWORD
          # itself. Empty on Windows so the .exe is not signed with a Mac cert.
          CSC_LINK: ${{ matrix.os == 'macos-latest' && secrets.CSC_LINK || '' }}
          CSC_KEY_PASSWORD: ${{ matrix.os == 'macos-latest' && secrets.CSC_KEY_PASSWORD || '' }}
          # On macOS this must be on so electron-builder finds the (self-)signed identity above.
          # On Windows it stays off (no cert) so the .exe is just built unsigned.
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ matrix.os == 'macos-latest' }}

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: SyncLink-${{ matrix.os }}
          path: |
            dist/*.dmg
            dist/*.exe
          if-no-files-found: error

  release:
    # Only publish a Releases page when a version tag was pushed.
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          body: |
            Download the installer for your computer below.

            - **Mac participants:** `SyncLink-*.dmg`
            - **Windows:** `SyncLink-*.exe`

            First time you open it, your computer will warn that the app is from
            an unidentified developer. See INSTALL_GUIDE.md in the repo for the
            one-time steps to open it.
