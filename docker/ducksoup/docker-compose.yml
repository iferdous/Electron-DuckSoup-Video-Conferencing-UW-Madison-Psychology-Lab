services:
  ducksoup:
    # x86_64 / Windows+NVIDIA hosts MUST set DUCKSOUP_IMAGE=ducksouplab/ducksoup:latest in .env; the ARM default won't load the x86 Mozza plugin (libgstmozza.so).
    image: ${DUCKSOUP_IMAGE:-ducksouplab/ducksoup:arm_latest}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DUCKSOUP_PORT=8100
      # CPU mode is the portable default for lab laptops and Apple Silicon Docker.
      # NVIDIA hosts can override these values in .env or a local compose override.
      - DUCKSOUP_NVCODEC=${DUCKSOUP_NVCODEC:-false}
      - DUCKSOUP_NVCUDA=${DUCKSOUP_NVCUDA:-false}
    volumes:
      - ./data:/app/data
      - ./log:/app/log
      - ./plugins:/app/plugins
    ports:
      - "8100:8100"
