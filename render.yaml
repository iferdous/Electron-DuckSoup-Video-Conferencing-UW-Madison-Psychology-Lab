services:
  - type: web
    name: nelf-call-signaling
    runtime: node
    plan: free
    region: ohio
    branch: main
    buildCommand: npm ci --omit=dev --ignore-scripts
    startCommand: npm run signal:start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SERVICE_NAME
        value: SyncLink Signaling
